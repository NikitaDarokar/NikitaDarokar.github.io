<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"defer> </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet"> 
</head>
<body>
    <h1>My birthday</h1>
    <div class="countdown-container">
        <div class="countdown-e1 days-c">
            <p class="big-text" id="days">
                0
            </p>
            <span>Days</span>
        </div>
        <div class="countdown-e1 hours-c">
            <p class="big-text" id="hours">
              0
            </p>
            <span>Hours</span>
        </div>
        <div class="countdown-e1 minutes-c">
            <p class="big-text" id="minutes">
                0
            </p>
            <span>Minutes</span>
        </div>
        <div class="countdown-e1 seconds-c">
            <p class="big-text" id="seconds">
                0
            </p>
            <span>Seconds</span>
        </div>
    </div>
</body>
</html>
